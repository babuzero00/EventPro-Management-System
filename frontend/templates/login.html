{% extends "base.html" %}

{% block content %}
<style>
    /* 1. FORCE FULL SCREEN - This removes the gap from base.html */
    body { padding-top: 0 !important; }
    .container-full { padding: 0 !important; max-width: 100% !important; }
    
    .auth-page-wrapper {
        min-height: 100vh;
        width: 100%;
        display: flex;
        background-color: var(--slate-bg);
    }

    /* 2. THE IMAGE SIDE (Same as Register) */
    .auth-image-column {
        flex: 0 0 58%; /* Takes up 58% of width */
        height: 100vh;
        position: relative;
        background-image: url('https://images.unsplash.com/photo-1492684223066-81342ee5ff30?auto=format&fit=crop&w=1600&q=80');
        background-size: cover;
        background-position: center;
    }

    .auth-image-overlay {
        position: absolute;
        inset: 0;
        background: linear-gradient(to top, rgba(1, 1, 3, 0.9), transparent);
        display: flex;
        flex-direction: column;
        justify-content: flex-end;
        padding: 80px;
    }

    /* 3. THE FORM SIDE */
    .auth-form-column {
        flex: 1;
        height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 40px;
    }

    .auth-glass-card {
        background: rgba(255, 255, 255, 0.02);
        backdrop-filter: blur(30px);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 40px;
        padding: 50px;
        width: 100%;
        max-width: 440px;
        box-shadow: 0 40px 100px rgba(0,0,0,0.5);
    }

    /* TYPOGRAPHY & INPUTS */
    .auth-header { font-weight: 900; font-size: 2.2rem; letter-spacing: -2px; }
    .text-cyan { color: var(--cyan-neon) !important; }
    
    .input-pro-box { position: relative; margin-bottom: 20px; }
    .input-pro-box i { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: var(--cyan-neon); }
    .input-pro-box input {
        width: 100%;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 18px !important;
        padding: 15px 15px 15px 55px !important;
        color: white !important;
        transition: 0.3s;
    }

    .btn-auth-pro {
        background: white !important; color: black !important; font-weight: 900;
        text-transform: uppercase; padding: 18px; border-radius: 18px; width: 100%;
        border: none; margin-top: 15px; transition: 0.4s;
    }
    .btn-auth-pro:hover { background: var(--cyan-neon) !important; transform: translateY(-5px); }

    .glow-line { width: 80px; height: 4px; background: var(--cyan-neon); box-shadow: 0 0 20px var(--cyan-neon); margin-bottom: 25px; }

    /* Hide image on mobile */
    @media (max-width: 992px) {
        .auth-image-column { display: none; }
        .auth-form-column { flex: 0 0 100%; }
    }
</style>

<div class="auth-page-wrapper">
    <div class="auth-image-column">
        <div class="auth-image-overlay">
            <div class="glow-line"></div>
            <h1 class="display-2 fw-900 text-white text-uppercase" style="letter-spacing: -5px;">RESUME_<br>SESSION.</h1>
            <p class="text-white-50 uppercase fw-bold ls-widest mt-2" style="letter-spacing: 5px;">Exclusive Access Only</p>
        </div>
    </div>

    <div class="auth-form-column">
        <div class="auth-glass-card">
            <div class="mb-5">
                <h2 class="auth-header">USER_<span class="text-cyan">AUTH</span></h2>
                <p class="text-white-50 small fw-bold uppercase" style="letter-spacing: 2px;">Identity Verification Protocol</p>
            </div>

            <form method="POST">
                {% csrf_token %}
                
                <div class="input-pro-box">
                    <i class="bi bi-person-fill"></i>
                    <input type="text" name="username" placeholder="USERNAME" required>
                </div>

                <div class="input-pro-box">
                    <i class="bi bi-shield-lock-fill"></i>
                    <input type="password" name="password" placeholder="PASSWORD" required>
                </div>

                <button type="submit" class="btn-auth-pro">Authorize Access</button>

                <div class="text-center mt-5">
                    <p class="text-white-50 small fw-bold">
                        NEW_USER? 
                        <a href="{% url 'register' %}" class="text-cyan text-decoration-none ms-2">CREATE_ACCOUNT</a>
                    </p>
                </div>
            </form>
        </div>
    </div>
</div>
{% endblock %}
